# resolver 127.0.0.11 valid=30s;

# HTTP блок
server {
    listen 80;
    server_name fstbot.ru www.fstbot.ru;
    
    # Перенаправление HTTP -> HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS блок
server {
    listen 443 ssl;
    http2 on;
    server_name fstbot.ru www.fstbot.ru;
    
    # SSL сертификаты
    ssl_certificate /etc/nginx/certs/fstbot.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/fstbot.ru/privkey.pem;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Безопасные заголовки
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    client_max_body_size 100M;
    
    # Статические файлы
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Robots.txt
    location = /robots.txt {
        alias /usr/share/nginx/html/static/robots.txt;
        access_log off;
    }
    
    # Проксирование к votes-app
    location / {
        proxy_pass http://votes-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
    
    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

# Fallback для проверки что Nginx работает
server {
    listen 80 default_server;
    server_name _;
    
    # Возвращаем простой ответ для проверки
    location / {
        return 200 "Nginx is running!\n";
        add_header Content-Type text/plain;
    }
}