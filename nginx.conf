# HTTP блок
server {
    listen 80;
    server_name fstbot.ru www.fstbot.ru;
    
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/static;
        allow all;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS блок
server {
    listen 443 ssl;
    http2 on;
    server_name fstbot.ru www.fstbot.ru;
    
    ssl_certificate /etc/nginx/certs/fstbot.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/fstbot.ru/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    client_max_body_size 100M;
    
    # Статические файлы - ВАЖНО: правильный путь
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri $uri/ =404;
    }
    
    # Проксирование к votes-app
    location / {
        proxy_pass http://votes-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}