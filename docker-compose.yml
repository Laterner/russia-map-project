services:
  votes-app:
    build: .
    container_name: votes-app
    ports:
      - "8000:8000"
    volumes:
      - ./votes.db:/votes.db
      - ./static:/app/static
    environment:
      - TZ=Europe/Moscow
    # restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs/fstbot.ru:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - votes-app
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
