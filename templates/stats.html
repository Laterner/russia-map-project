<!DOCTYPE html>
<html>
<head>
    <title>Статистика голосования</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4CAF50;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Статистика голосов</h1>
        <table>
            <thead>
                <tr>
                    <th>Город</th>
                    <th>Код</th>
                    <th>Голосов</th>
                </tr>
            </thead>
            <tbody>
                {% for region in stats %}
                <tr>
                    <td>{{ region[0] }}</td>
                    <td>{{ region[1] }}</td>
                    <td>{{ region[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="back-link">← Назад к голосованию</a>
    </div>
</body>
</html>
