<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карта голосований по регионам</title>
    <link rel="stylesheet" href="static/css/map.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>🗺️ Карта <span>голосований</span></h1>
            <div class="status-badge">
                <span class="status-dot online" id="statusDot"></span>
                <span id="statusText">Подключено</span>
                <span class="last-update" id="lastUpdate">—</span>
            </div>
        </div>
        
        <!-- Карта -->
        <div class="map-wrapper">
            <div class="rf-map" id="mapContainer">
                <div id="mapPlaceholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#4a5568;font-size:18px;">
                    ⏳ Загрузка карты...
                </div>
            </div>
        </div>
        
        <!-- Нижняя панель -->
        <div class="bottom-panel">
            <div id="info">👆 Нажмите на регион, чтобы увидеть детали</div>
            <div id="stats">
                <h3>🏆 Топ регионов</h3>
                <ul id="statsList">
                    <li style="color:#4a5568;">Загрузка...</li>
                </ul>
            </div>
        </div>
        
        <!-- Легенда -->
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-top:10px;flex-shrink:0;">
            <div class="legend">
                <span style="color:#718096;font-size:12px;font-weight:500;">Голосов:</span>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#fc8181,#e53e3e);"></span>1-2</div>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#f6ad55,#dd6b20);"></span>3-5</div>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#f6e05e,#d69e2e);"></span>6-10</div>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#68d391,#38a169);"></span>11-20</div>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#63b3ed,#3182ce);"></span>21-40</div>
                <div class="legend-item"><span class="legend-color" style="background:linear-gradient(135deg,#b794f4,#805ad5);"></span>40+</div>
            </div>
            <div class="status-text" id="debugInfo">🔄 Автообновление каждые 2 сек</div>
        </div>
    </div>
    
    <script type="module">
        // ============================================================
        // 1. КОНФИГУРАЦИЯ
        // ============================================================
        const API_URL = '/api/get_map_votes';
        const UPDATE_INTERVAL = 2000;
        
        // ============================================================
        // 2. СПИСОК РЕГИОНОВ (коды из data-code на карте)
        // ============================================================
        const REGION_CODES = [
            'RU-MOW', 'RU-SPE', 'RU-NEN', 'RU-YAR', 'RU-CHE', 'RU-ULY',
            'RU-TYU', 'RU-TUL', 'RU-SVE', 'RU-RYA', 'RU-ORL', 'RU-OMS',
            'RU-NGR', 'RU-LIP', 'RU-KRS', 'RU-KGN', 'RU-KGD', 'RU-IVA',
            'RU-BRY', 'RU-AST', 'RU-KHA', 'RU-CE', 'RU-UD', 'RU-SE',
            'RU-MO', 'RU-KR', 'RU-KL', 'RU-IN', 'RU-AL', 'RU-BA',
            'RU-AD', 'RU-CR', 'RU-SEV', 'RU-KO', 'RU-KIR', 'RU-PNZ',
            'RU-TAM', 'RU-MUR', 'RU-LEN', 'RU-VLG', 'RU-KOS', 'RU-PSK',
            'RU-ARK', 'RU-YAN', 'RU-CHU', 'RU-YEV', 'RU-TY', 'RU-SAK',
            'RU-AMU', 'RU-BU', 'RU-KK', 'RU-KEM', 'RU-NVS', 'RU-ALT',
            'RU-DA', 'RU-STA', 'RU-KB', 'RU-KC', 'RU-KDA', 'RU-ROS',
            'RU-SAM', 'RU-TA', 'RU-ME', 'RU-CU', 'RU-NIZ', 'RU-VLA',
            'RU-MOS', 'RU-KLU', 'RU-BEL', 'RU-ZAB', 'RU-PRI', 'RU-KAM',
            'RU-MAG', 'RU-SA', 'RU-KYA', 'RU-ORE', 'RU-SAR', 'RU-VGG',
            'RU-VOR', 'RU-SMO', 'RU-TVE', 'RU-PER', 'RU-KHM', 'RU-TOM',
            'RU-IRK', 'RU-HR', 'RU-ZP', 'RU-DON', 'RU-LUG'
        ];
        
        // Координаты маркеров в процентах от размера карты (0-100)
        // x — горизонталь, y — вертикаль (0 = верх)
        const MARKER_COORDS = {
            'RU-DON': { x: 60.5, y: 23.3 },
            'RU-LUG': { x: 60.9, y: 23.0 },
            'RU-ZP': { x: 59.8, y: 23.4 },
            'RU-HR': { x: 59.0, y: 24.1 },
            'RU-CR': { x: 59.4, y: 25.0 },
            // Добавьте другие регионы при необходимости
            // 'RU-MOW': { x: 37.6, y: 14.5 },
            // 'RU-SPE': { x: 30.3, y: 10.5 },
        };
        
        // ============================================================
        // 3. СОСТОЯНИЕ
        // ============================================================
        let votesData = {};
        let regionNames = {};
        let selectedRegion = null;
        let updateTimer = null;
        let isFirstLoad = true;
        
        // ============================================================
        // 4. DOM-ЭЛЕМЕНТЫ
        // ============================================================
        const mapContainer = document.getElementById('mapContainer');
        const infoDiv = document.getElementById('info');
        const statsList = document.getElementById('statsList');
        const debugInfo = document.getElementById('debugInfo');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const lastUpdateEl = document.getElementById('lastUpdate');
        
        // ============================================================
        // 5. РАБОТА С ДАННЫМИ
        // ============================================================
        async function fetchVotes() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Ошибка:', error);
                return null;
            }
        }
        
        function processVotesData(data) {
            const result = {};
            REGION_CODES.forEach(code => result[code] = 0);
            
            if (Array.isArray(data)) {
                data.forEach(item => {
                    const code = item.region || item.code || item.id;
                    const votes = item.votes || item.count || 0;
                    if (code && REGION_CODES.includes(code)) result[code] = votes;
                });
            } else if (data && typeof data === 'object') {
                if (data.regions && typeof data.regions === 'object') {
                    Object.entries(data.regions).forEach(([key, val]) => {
                        if (REGION_CODES.includes(key)) result[key] = val;
                    });
                } else {
                    Object.entries(data).forEach(([key, val]) => {
                        if (REGION_CODES.includes(key)) result[key] = val;
                    });
                }
            }
            return result;
        }
        
        // ============================================================
        // 6. ОТРИСОВКА МАРКЕРОВ
        // ============================================================
        function getLevel(votes) {
            if (votes === 0) return 0;
            if (votes <= 2) return 1;
            if (votes <= 5) return 2;
            if (votes <= 10) return 3;
            if (votes <= 20) return 4;
            if (votes <= 40) return 5;
            return 6;
        }
        
        function renderMarkers() {
            // Удаляем старые маркеры
            const oldMarkers = mapContainer.querySelectorAll('.custom-marker');
            oldMarkers.forEach(m => m.remove());
            
            const svg = mapContainer.querySelector('svg');
            if (!svg) return;
            
            const rect = mapContainer.getBoundingClientRect();
            const svgRect = svg.getBoundingClientRect();
            
            // Коэффициент масштабирования
            const scaleX = rect.width / 100;
            const scaleY = rect.height / 100;
            
            Object.entries(MARKER_COORDS).forEach(([code, coords]) => {
                const votes = votesData[code] || 0;
                
                // Показываем маркер только если есть голоса
                if (votes <= 0) return;
                
                const level = getLevel(votes);
                
                const marker = document.createElement('div');
                marker.className = 'custom-marker visible';
                marker.dataset.region = code;
                
                const x = coords.x * scaleX;
                const y = coords.y * scaleY;
                
                marker.style.left = x + 'px';
                marker.style.top = y + 'px';
                
                // Точка с числом
                const dot = document.createElement('div');
                dot.className = `marker-dot has-votes level-${level}`;
                dot.textContent = votes;
                
                // Подпись
                const label = document.createElement('div');
                label.className = 'marker-label';
                label.textContent = regionNames[code] || code;
                
                marker.appendChild(dot);
                marker.appendChild(label);
                mapContainer.appendChild(marker);
            });
        }
        
        // ============================================================
        // 7. ОБНОВЛЕНИЕ КАРТЫ (подсветка регионов)
        // ============================================================
        function updateMapColors() {
            const svg = mapContainer.querySelector('svg');
            if (!svg) return;
            
            const paths = svg.querySelectorAll('path[data-code]');
            paths.forEach(path => {
                const code = path.dataset.code || path.getAttribute('data-code');
                if (!code) return;
                
                const votes = votesData[code] || 0;
                const hasVotes = votes > 0;
                
                // Если есть голоса — делаем чуть ярче
                if (hasVotes) {
                    path.style.fill = '#3a5a7e';
                    path.classList.add('has-votes');
                } else {
                    path.style.fill = '#2a3a5e';
                    path.classList.remove('has-votes');
                }
            });
        }
        
        // ============================================================
        // 8. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================
        function renderStats() {
            const total = Object.values(votesData).reduce((sum, v) => sum + v, 0);
            
            const sorted = Object.entries(votesData)
                .filter(([_, votes]) => votes > 0)
                .sort((a, b) => b[1] - a[1]);
            
            if (sorted.length === 0) {
                statsList.innerHTML = '<li style="color:#4a5568;">Нет голосов</li>';
                return;
            }
            
            let html = '';
            sorted.slice(0, 10).forEach(([code, votes]) => {
                const name = regionNames[code] || code;
                html += `<li><span>${name}</span> <span class="votes-num">${votes}</span></li>`;
            });
            
            html += `<li class="total-row"><span>Всего</span> <span class="votes-num">${total}</span></li>`;
            statsList.innerHTML = html;
        }
        
        // ============================================================
        // 9. ОБНОВЛЕНИЕ ИНФОРМАЦИИ О РЕГИОНЕ
        // ============================================================
        function updateInfo(regionCode) {
            if (regionCode && regionNames[regionCode]) {
                const votes = votesData[regionCode] || 0;
                const name = regionNames[regionCode];
                infoDiv.innerHTML = `
                    📍 <span class="region-name">${name}</span>
                    &nbsp;—&nbsp;
                    <span class="votes-count">${votes} голос${votes % 10 === 1 && votes % 100 !== 11 ? '' : 'ов'}</span>
                `;
            } else {
                const total = Object.values(votesData).reduce((sum, v) => sum + v, 0);
                const votedRegions = Object.values(votesData).filter(v => v > 0).length;
                infoDiv.innerHTML = `
                    📊 Всего голосов: <span class="votes-count">${total}</span>
                    &nbsp;·&nbsp; Регионов: <span class="highlight-blue">${votedRegions}</span>
                    &nbsp;·&nbsp; Нажмите на регион
                `;
            }
        }
        
        // ============================================================
        // 10. СБОР НАЗВАНИЙ РЕГИОНОВ
        // ============================================================
        function collectRegionNames() {
            const svg = mapContainer.querySelector('svg');
            if (!svg) return;
            
            const paths = svg.querySelectorAll('path[data-code]');
            paths.forEach(path => {
                const code = path.dataset.code || path.getAttribute('data-code');
                const title = path.dataset.title || path.getAttribute('data-title') || code;
                if (code) regionNames[code] = title;
            });
        }
        
        // ============================================================
        // 11. ГЛАВНЫЙ ЦИКЛ
        // ============================================================
        async function updateData() {
            try {
                const data = await fetchVotes();
                if (data === null) {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Ошибка';
                    return;
                }
                
                votesData = processVotesData(data);
                
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Подключено';
                lastUpdateEl.textContent = new Date().toLocaleTimeString();
                debugInfo.textContent = `✅ ${new Date().toLocaleTimeString()}`;
                
                updateMapColors();
                renderMarkers();
                renderStats();
                updateInfo(selectedRegion);
                
                isFirstLoad = false;
            } catch (error) {
                console.error('Ошибка:', error);
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Ошибка';
            }
        }
        
        // ============================================================
        // 12. КЛИКИ ПО РЕГИОНАМ
        // ============================================================
        function setupRegionClicks() {
            const svg = mapContainer.querySelector('svg');
            if (!svg) return;
            
            const paths = svg.querySelectorAll('path[data-code]');
            paths.forEach(path => {
                path.addEventListener('click', () => {
                    const code = path.dataset.code || path.getAttribute('data-code');
                    if (code) {
                        selectedRegion = code;
                        paths.forEach(p => p.classList.remove('active'));
                        path.classList.add('active');
                        updateInfo(code);
                    }
                });
                path.addEventListener('mouseenter', () => {
                    path.style.cursor = 'pointer';
                });
            });
        }
        
                // ============================================================
        // 4.1 ЗАГРУЗКА SVG КАРТЫ
        // ============================================================
        // Если карта у вас в отдельном файле — раскомментируйте:
        async function loadMapSVG() {
            const response = await fetch('/static/map.svg');
            const svgText = await response.text();
            const placeholder = document.getElementById('mapPlaceholder');
            placeholder.outerHTML = svgText;
        }
        loadMapSVG();
        
        // Если карта уже в HTML — просто находим SVG:
        function getMapSVG() {
            // Ищем SVG внутри контейнера
            let svg = mapContainer.querySelector('svg');
            if (!svg) {
                // Если нет — используем встроенную заглушку
                console.warn('SVG карта не найдена, используем заглушку');
                showPlaceholder();
                return null;
            }
            return svg;
        }
        
        function showPlaceholder() {
            mapContainer.innerHTML = `
                <div style="padding:60px 20px;text-align:center;color:#999;font-size:16px;">
                    <div style="font-size:48px;margin-bottom:16px;">🗺️</div>
                    <p>Карта не загружена</p>
                    <p style="font-size:13px;">Убедитесь, что SVG-код карты вставлен в HTML</p>
                </div>
            `;
        }

        // ============================================================
        // 13. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        function init() {
            const svg = mapContainer.querySelector('svg');
            if (!svg) {
                setTimeout(init, 500);
                return;
            }
            
            collectRegionNames();
            setupRegionClicks();
            updateData();
            
            if (updateTimer) clearInterval(updateTimer);
            updateTimer = setInterval(updateData, UPDATE_INTERVAL);
            
            console.log('🗺️ Карта инициализирована, регионов:', Object.keys(regionNames).length);
        }
        
        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', () => {
            if (updateTimer) clearInterval(updateTimer);
        });
        
        window.__map = { votesData, regionNames, updateData };
    </script>
</body>
</html>
